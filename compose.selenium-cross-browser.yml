services:
  selenium-grid:
    image: selenium/hub:4.27.0-20241204
    ports:
      - "${SELENIUM_GRID_PORT:-4444}:4444"
    networks:
      - idelium_net
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      SE_ENABLE_TRACING: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent --show-error http://127.0.0.1:4444/status >/dev/null",
        ]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 12

  selenium-node-chromium:
    image: selenium/node-chromium:4.27.0-20241204
    shm_size: 2gb
    depends_on:
      selenium-grid:
        condition: service_started
    networks:
      - idelium_net
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      SE_ENABLE_TRACING: "false"
      SE_EVENT_BUS_HOST: selenium-grid
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
      SE_NODE_MAX_SESSIONS: "1"
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"

  selenium-node-firefox:
    image: selenium/node-firefox:4.27.0-20241204
    shm_size: 2gb
    depends_on:
      selenium-grid:
        condition: service_started
    networks:
      - idelium_net
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      SE_ENABLE_TRACING: "false"
      SE_EVENT_BUS_HOST: selenium-grid
      SE_EVENT_BUS_PUBLISH_PORT: "4442"
      SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
      SE_NODE_MAX_SESSIONS: "1"
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan tracked content for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate Compose, scripts, and immutable-source policy
        run: ./scripts/validate.sh

  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out stack
        uses: actions/checkout@v7
        with:
          path: idelium-docker

      - name: Check out API source
        uses: actions/checkout@v7
        with:
          repository: idelium/idelium-api
          path: idelium-api

      - name: Check out Web source
        uses: actions/checkout@v7
        with:
          repository: idelium/idelium-web
          path: idelium-web

      - name: Build immutable images without cache
        working-directory: idelium-docker
        run: ./scripts/build-local.sh --no-cache

      - name: Start and smoke-test the complete stack
        working-directory: idelium-docker
        run: ./start-idelium.sh --demo

      - name: Inspect final service state
        working-directory: idelium-docker
        run: docker compose -f docker-compose.yml -f compose.demo.yml ps

      - name: Stop integration stack
        if: always()
        working-directory: idelium-docker
        run: docker compose -f docker-compose.yml -f compose.demo.yml down --volumes --remove-orphans

  webdriver-cross-browser:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out stack
        uses: actions/checkout@v7

      - name: Start pinned Selenium Grid with Chromium and Firefox nodes
        run: |
          docker compose \
            --project-name idelium-webdriver-ci \
            -f docker-compose.yml \
            -f compose.demo.yml \
            -f compose.selenium-cross-browser.yml \
            up --detach --wait --wait-timeout 180 \
            selenium-grid selenium-node-chromium selenium-node-firefox

      - name: Run cross-browser WebDriver smoke test
        run: ./scripts/selenium-cross-browser-smoke-test.sh

      - name: Inspect Selenium service state
        if: always()
        run: |
          docker compose \
            --project-name idelium-webdriver-ci \
            -f docker-compose.yml \
            -f compose.demo.yml \
            -f compose.selenium-cross-browser.yml \
            ps

      - name: Stop Selenium Grid
        if: always()
        run: |
          docker compose \
            --project-name idelium-webdriver-ci \
            -f docker-compose.yml \
            -f compose.demo.yml \
            -f compose.selenium-cross-browser.yml \
            down --volumes --remove-orphans

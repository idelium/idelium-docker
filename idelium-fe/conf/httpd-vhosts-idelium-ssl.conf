<VirtualHost *:443>
	# The ServerName directive sets the request scheme, hostname and port that
	# the server uses to identify itself. This is used when creating
	# redirection URLs. In the context of virtual hosts, the ServerName
	# specifies what hostname must appear in the request's Host: header to
	# match this virtual host. For the default virtual host (this file) this
	# value is not decisive as it is used as a last resort host regardless.
	# However, you must set it for any further virtual host explicitly.
	#ServerName www.example.com

	ServerAdmin webmaster@localhost
	DocumentRoot /usr/local/apache2/htdocs

	SSLEngine on
	SSLCertificateFile     /usr/local/apache2/certs/server.crt
	SSLCertificateKeyFile  /usr/local/apache2/certs/server.key

    Header always set Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; frame-src https://www.google.com https://recaptcha.google.com; img-src 'self' data: https://www.google-analytics.com; object-src 'none'; script-src 'self' https://www.google.com https://www.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Permissions-Policy "camera=(), geolocation=(), microphone=()"

    RequestHeader set "X-Forwarded-Proto" expr=%{REQUEST_SCHEME}
    RequestHeader set "X-Forwarded-SSL" expr=%{HTTPS}


	# Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
	# error, crit, alert, emerg.
	# It is also possible to configure the loglevel for particular
	# modules, e.g.
	#LogLevel info ssl:warn

    LogFormat "%V %h %l %u %t \"%r\" %s %b" vcommon
    ErrorLog "logs/dply-ssl-error_log"
    CustomLog "logs/dply-ssl-access_log" common

	# For most configuration files from conf-available/, which are
	# enabled or disabled at a global level, it is possible to
	# include a line for only one particular virtual host. For example the
	# following line enables the CGI configuration for this host only
	# after it has been globally disabled with "a2disconf".
	#Include conf-available/serve-cgi-bin.conf
	<IfModule mod_negotiation.c>
  		Options -MultiViews
	</IfModule>
	<Directory "/usr/local/apache2/htdocs">
	     FallbackResource /index.html
	</Directory>
    ProxyPass        /api http://ideliumapi:80/api
    ProxyPassReverse /api http://ideliumapi:80/api


</VirtualHost>
